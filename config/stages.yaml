# Per-stage configuration for local Codex subscription runs. Keep Hunt and
# Validate on different model settings: that deliberate disagreement is a
# pipeline invariant.

defaults:
  max_turns: 25
  permission_mode: workspace-write
  repair_attempts: 1             # one re-emit chance on schema-validation failure

stages:
  recon:
    model: gpt-5.5
    concurrency: 1
    tools: [Read, Grep, Glob, Bash]
    max_turns: 60                # recon can be long
    repair_attempts: 2           # critical one-shot; spend a second repair turn if needed
  hunt:
    model: gpt-5.4
    concurrency: 3
    tools: [Read, Grep, Glob, Bash]
  validate:
    model: gpt-5.5               # different from hunt: deliberate disagreement
    concurrency: 2
    tools: [Read, Grep, Glob]    # maps to Codex read-only sandbox
  gapfill:
    model: gpt-5.4
    concurrency: 1
    tools: [Read, Grep, Glob]
    repair_attempts: 2
  dedupe:
    model: gpt-5.4
    concurrency: 1
    tools: [Read]
  trace:
    model: gpt-5.5               # most critical stage
    concurrency: 2
    tools: [Read, Grep, Glob, Bash]
  feedback:
    model: gpt-5.4
    concurrency: 1
    tools: [Read, Grep, Glob]
    repair_attempts: 2
  report:
    model: gpt-5.4
    concurrency: 1
    tools: [Read]

# Bounded loops to prevent runaway usage
loops:
  gapfill_iterations: 2     # max Hunt → Validate → Gapfill cycles
  feedback_iterations: 1    # one feedback pass after Trace
